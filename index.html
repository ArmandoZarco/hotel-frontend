<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HotelSuite Pro Premium</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
background:#0f172a;
color:white;
}

.sidebar{
width:250px;
height:100vh;
background:#020617;
padding:20px;
position:fixed;
overflow:auto;
}

.sidebar h2{
text-align:center;
margin-bottom:25px;
color:#38bdf8;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:15px;
margin-bottom:10px;
background:#1e293b;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.sidebar li:hover{
background:#2563eb;
transform:translateX(5px);
}

.main{
margin-left:270px;
padding:20px;
width:100%;
}

.titulo{
text-align:center;
margin-bottom:10px;
}

.fecha{
text-align:center;
margin-bottom:20px;
color:#94a3b8;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

.card h2{
color:#10b981;
font-size:30px;
}

.formulario{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:25px;
}

.formulario h2{
margin-bottom:10px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
}

.btnGuardar{
background:#10b981;
color:white;
font-weight:bold;
cursor:pointer;
padding:12px;
}

.btnGuardar:hover{
background:#059669;
}

.buscar{
width:100%;
padding:12px;
margin-bottom:20px;
border:none;
border-radius:8px;
}

#habitaciones{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.hab{
background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

table{
width:100%;
background:white;
color:black;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th{
background:#10b981;
color:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.checkin{
background:#f59e0b;
color:white;
padding:8px;
border:none;
border-radius:5px;
cursor:pointer;
}

.checkout{
background:#2563eb;
color:white;
padding:8px;
border:none;
border-radius:5px;
cursor:pointer;
}

.cancelar{
background:#dc2626;
color:white;
padding:8px;
border:none;
border-radius:5px;
cursor:pointer;
}

.eliminar{
background:#111827;
color:white;
padding:8px;
border:none;
border-radius:5px;
cursor:pointer;
}

.seccion{
margin-bottom:30px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🏨 HotelSuite Pro</h2>

<ul>

<li onclick="irDashboard()">
📊 Dashboard
</li>

<li onclick="irHabitaciones()">
🛏 Habitaciones
</li>

<li onclick="irReservas()">
📅 Reservas
</li>

<li onclick="irIngresos()">
💰 Ingresos
</li>

</ul>

</div>

<div class="main">

<h1 class="titulo">
🏨 Sistema de Gestión Hotelera
</h1>

<div class="fecha" id="fechaActual"></div>

<div class="dashboard" id="dashboard">

<div class="card">
<h2 id="totalReservas">0</h2>
<p>Reservas</p>
</div>

<div class="card">
<h2 id="ocupadas">0</h2>
<p>Ocupadas</p>
</div>

<div class="card">
<h2 id="finalizadas">0</h2>
<p>Finalizadas</p>
</div>

<div class="card" id="seccionIngresos">
<h2 id="ingresos">$0</h2>
<p>Ingresos</p>
</div>

<div class="card">
<h2 id="disponibles">10</h2>
<p>Disponibles</p>
</div>

<div class="card">
<h2 id="huespedes">0</h2>
<p>Huéspedes</p>
</div>

</div>

<div class="seccion">

<h2 id="seccionHabitaciones">
🛏 Estado de Habitaciones
</h2>

<br>

<div id="habitaciones"></div>

</div>

<div class="formulario">

<h2>Nueva Reserva</h2>

<form id="formReserva">

<input
type="text"
id="cliente"
placeholder="Nombre del huésped"
required
>

<input
type="text"
id="telefono"
placeholder="Teléfono"
required
>

<input
type="number"
id="habitacion"
placeholder="Habitación (001-200)"
required
>

<select id="tipo">

<option>Individual</option>
<option>Doble</option>
<option>Suite</option>

</select>

<input
type="date"
id="entrada"
required
>

<input
type="date"
id="salida"
required
>

<input
type="number"
id="personas"
placeholder="Personas"
required
>

<input
type="number"
id="precio"
placeholder="Precio por noche"
required
>

<button
type="submit"
class="btnGuardar"
>
Registrar Reserva
</button>

</form>

</div>

<div class="seccion">

<input
class="buscar"
type="text"
id="buscar"
placeholder="Buscar huésped..."
>

<table id="tablaReservas">

<thead>

<tr>

<th>Cliente</th>
<th>Habitación</th>
<th>Tipo</th>
<th>Total</th>
<th>Estado</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
